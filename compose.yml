services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: babilonia-app
    ports:
      - '${PORT:-3000}:3000'
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=babilonia
    depends_on:
      - db
    networks:
      - babilonia-network
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: babilonia-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: babilonia
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - babilonia-network
    restart: always

networks:
  babilonia-network:
    driver: bridge

volumes:
  postgres_data:
